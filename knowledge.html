<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Knowledge page for the personal knowledge graph.">
    <title>Knowledge | Personal Knowledge Graph</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/site.css">
    <script defer src="scripts/site.js"></script>
  </head>
  <body data-page="knowledge">
    <header class="site-header">
      <div class="site-nav">
        <a class="brand" href="index.html">
          <span class="brand-title" data-i18n-zh="Knowledge Graph" data-i18n-en="Knowledge Graph">Knowledge Graph</span>
          <span class="brand-subtitle" data-i18n-zh="一次一个知识点，逐步探索智能。" data-i18n-en="Explore intelligence, one note at a time.">一次一个知识点，逐步探索智能。</span>
        </a>
        <div class="nav-right">
          <nav class="nav-links" aria-label="Main navigation">
            <a href="index.html" data-nav="home" data-i18n-zh="HOME" data-i18n-en="HOME">HOME</a>
            <a href="knowledge.html" data-nav="knowledge" data-i18n-zh="Knowledge" data-i18n-en="Knowledge">Knowledge</a>
            <a href="projects.html" data-nav="projects" data-i18n-zh="Project" data-i18n-en="Project">Project</a>
            <a href="contact.html" data-nav="contact" data-i18n-zh="CONTACT" data-i18n-en="CONTACT">CONTACT</a>
          </nav>
          <div class="nav-controls">
            <button class="icon-btn" type="button" data-theme-toggle>
              <i class="fas fa-moon" aria-hidden="true"></i>
              <span data-theme-label>Dark</span>
            </button>
            <button class="icon-btn" type="button" data-lang-toggle>
              <i class="fas fa-language" aria-hidden="true"></i>
              <span data-lang-label>EN</span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="page-shell knowledge-page-shell" data-knowledge-explorer>
      <aside class="knowledge-left-rail" data-knowledge-sidebar>
        <div class="rail-header">
          <h3 data-i18n-zh="知识目录" data-i18n-en="Knowledge Index">知识目录</h3>
          <button class="rail-toggle" type="button" data-sidebar-collapse aria-label="收起侧边栏" title="收起侧边栏">
            <i class="fas fa-angles-left" aria-hidden="true"></i>
          </button>
        </div>
        <p class="muted rail-intro" data-i18n-zh="左侧支持折叠与展开，点击子类可联动筛选。" data-i18n-en="Left rail supports collapse/expand. Click sub-items to filter nodes.">左侧支持折叠与展开，点击子类可联动筛选。</p>

        <nav class="domain-tree" aria-label="Knowledge taxonomy">
          <section class="domain-group is-open" data-domain-group>
            <button class="domain-toggle" type="button" data-domain-toggle aria-expanded="true">
              <span class="domain-toggle-label" data-i18n-zh="哲学" data-i18n-en="Philosophy">哲学</span>
              <i class="fas fa-chevron-down" aria-hidden="true"></i>
            </button>
            <ul class="domain-children" data-domain-panel>
              <li><button class="domain-link" type="button" data-domain-filter="philosophy" data-i18n-zh="认识论、科学哲学、意识与智能本体" data-i18n-en="Epistemology, philosophy of science, consciousness and intelligence ontology">认识论、科学哲学、意识与智能本体</button></li>
            </ul>
          </section>

          <section class="domain-group" data-domain-group>
            <button class="domain-toggle" type="button" data-domain-toggle aria-expanded="false">
              <span class="domain-toggle-label" data-i18n-zh="数学" data-i18n-en="Mathematics">数学</span>
              <i class="fas fa-chevron-down" aria-hidden="true"></i>
            </button>
            <ul class="domain-children" data-domain-panel>
              <li><button class="domain-link" type="button" data-domain-filter="mathematics" data-i18n-zh="线性代数、概率统计、优化、信息论" data-i18n-en="Linear algebra, probability and statistics, optimization, information theory">线性代数、概率统计、优化、信息论</button></li>
            </ul>
          </section>

          <section class="domain-group" data-domain-group>
            <button class="domain-toggle" type="button" data-domain-toggle aria-expanded="false">
              <span class="domain-toggle-label" data-i18n-zh="物理学" data-i18n-en="Physics">物理学</span>
              <i class="fas fa-chevron-down" aria-hidden="true"></i>
            </button>
            <ul class="domain-children" data-domain-panel>
              <li><button class="domain-link" type="button" data-domain-filter="physics" data-i18n-zh="复杂系统、动力学、统计物理与计算建模" data-i18n-en="Complex systems, dynamics, statistical physics and computational modeling">复杂系统、动力学、统计物理与计算建模</button></li>
            </ul>
          </section>

          <section class="domain-group" data-domain-group>
            <button class="domain-toggle" type="button" data-domain-toggle aria-expanded="false">
              <span class="domain-toggle-label" data-i18n-zh="经济学" data-i18n-en="Economics">经济学</span>
              <i class="fas fa-chevron-down" aria-hidden="true"></i>
            </button>
            <ul class="domain-children" data-domain-panel>
              <li><button class="domain-link" type="button" data-domain-filter="economics" data-i18n-zh="风险、市场微观结构、量化策略与决策" data-i18n-en="Risk, market microstructure, quantitative strategy and decision-making">风险、市场微观结构、量化策略与决策</button></li>
            </ul>
          </section>

          <section class="domain-group" data-domain-group>
            <button class="domain-toggle" type="button" data-domain-toggle aria-expanded="false">
              <span class="domain-toggle-label" data-i18n-zh="神经科学" data-i18n-en="Neuroscience">神经科学</span>
              <i class="fas fa-chevron-down" aria-hidden="true"></i>
            </button>
            <ul class="domain-children" data-domain-panel>
              <li><button class="domain-link" type="button" data-domain-filter="neuroscience" data-i18n-zh="大脑机制、神经编码、学习与记忆过程" data-i18n-en="Brain mechanisms, neural coding, learning and memory">大脑机制、神经编码、学习与记忆过程</button></li>
            </ul>
          </section>

          <section class="domain-group" data-domain-group>
            <button class="domain-toggle" type="button" data-domain-toggle aria-expanded="false">
              <span class="domain-toggle-label" data-i18n-zh="心理学" data-i18n-en="Psychology">心理学</span>
              <i class="fas fa-chevron-down" aria-hidden="true"></i>
            </button>
            <ul class="domain-children" data-domain-panel>
              <li><button class="domain-link" type="button" data-domain-filter="psychology" data-i18n-zh="认知偏差、行为决策、学习动机与人格差异" data-i18n-en="Cognitive biases, behavioral decision-making, motivation and personality">认知偏差、行为决策、学习动机与人格差异</button></li>
            </ul>
          </section>

          <section class="domain-group" data-domain-group>
            <button class="domain-toggle" type="button" data-domain-toggle aria-expanded="false">
              <span class="domain-toggle-label" data-i18n-zh="计算机科学" data-i18n-en="Computer Science">计算机科学</span>
              <i class="fas fa-chevron-down" aria-hidden="true"></i>
            </button>
            <ul class="domain-children" data-domain-panel>
              <li><button class="domain-link" type="button" data-domain-filter="computer-science" data-i18n-zh="算法、系统、软件工程、机器学习与智能体" data-i18n-en="Algorithms, systems, software engineering, machine learning and agents">算法、系统、软件工程、机器学习与智能体</button></li>
            </ul>
          </section>

          <section class="domain-group" data-domain-group>
            <button class="domain-toggle" type="button" data-domain-toggle aria-expanded="false">
              <span class="domain-toggle-label" data-i18n-zh="控制理论与控制论" data-i18n-en="Control theory and cybernetics">控制理论与控制论</span>
              <i class="fas fa-chevron-down" aria-hidden="true"></i>
            </button>
            <ul class="domain-children" data-domain-panel>
              <li><button class="domain-link" type="button" data-domain-filter="control-theory-cybernetics" data-i18n-zh="反馈、稳定性、最优控制与系统辨识" data-i18n-en="Feedback, stability, optimal control and system identification">反馈、稳定性、最优控制与系统辨识</button></li>
            </ul>
          </section>

          <section class="domain-group" data-domain-group>
            <button class="domain-toggle" type="button" data-domain-toggle aria-expanded="false">
              <span class="domain-toggle-label" data-i18n-zh="语言学" data-i18n-en="Linguistics">语言学</span>
              <i class="fas fa-chevron-down" aria-hidden="true"></i>
            </button>
            <ul class="domain-children" data-domain-panel>
              <li><button class="domain-link" type="button" data-domain-filter="linguistics" data-i18n-zh="语义、语法、语用与人机语言交互" data-i18n-en="Semantics, syntax, pragmatics and human-machine language interaction">语义、语法、语用与人机语言交互</button></li>
            </ul>
          </section>

          <section class="domain-group" data-domain-group>
            <button class="domain-toggle" type="button" data-domain-toggle aria-expanded="false">
              <span class="domain-toggle-label" data-i18n-zh="人工智能" data-i18n-en="Artificial Intelligence">人工智能</span>
              <i class="fas fa-chevron-down" aria-hidden="true"></i>
            </button>
            <ul class="domain-children" data-domain-panel>
              <li><button class="domain-link" type="button" data-domain-filter="artificial-intelligence" data-i18n-zh="机器学习、深度学习、智能体与推理系统" data-i18n-en="Machine learning, deep learning, agents and reasoning systems">机器学习、深度学习、智能体与推理系统</button></li>
            </ul>
          </section>
        </nav>
      </aside>

      <div class="knowledge-main-area">
        <section class="hero-block">
          <span class="hero-kicker" data-i18n-zh="可阅读笔记 + 可检索数据" data-i18n-en="Readable notes + retrievable data"><i class="fas fa-book-open"></i> 可阅读笔记 + 可检索数据</span>
          <h1 class="hero-title" data-i18n-zh="Knowledge 像博客一样被阅读，<span class='accent'>也像数据一样被检索。</span>" data-i18n-en="Read Knowledge like a blog, <span class='accent'>query it like data.</span>">Knowledge 像博客一样被阅读，<span class="accent">也像数据一样被检索。</span></h1>
          <p class="hero-subtitle" data-i18n-zh="这个页面直接读取 <code>graph/knowledge-graph.json</code>。最左侧目录可展开/收起；中部为知识文章列表，右侧为当前节点详情，适合人读，也适合 agent 检索与推理。" data-i18n-en="This page reads <code>graph/knowledge-graph.json</code>. The far-left index can expand/collapse; the middle area lists knowledge nodes and the right panel shows focused details for both human reading and agent retrieval.">这个页面直接读取 <code>graph/knowledge-graph.json</code>。最左侧目录可展开/收起；中部为知识文章列表，右侧为当前节点详情，适合人读，也适合 agent 检索与推理。</p>
        </section>

        <section class="knowledge-main">
          <div class="toolbar">
            <button class="icon-btn sidebar-open-btn" type="button" data-sidebar-open>
              <i class="fas fa-bars" aria-hidden="true"></i>
              <span data-i18n-zh="目录" data-i18n-en="Index">目录</span>
            </button>
            <input class="search-input" type="search" placeholder="搜索标题、标签、别名、关键词..." data-i18n-ph-zh="搜索标题、标签、别名、关键词..." data-i18n-ph-en="Search title, tags, aliases, keywords..." data-node-search>
            <div class="filter-group" aria-label="Knowledge type filters">
              <button class="filter-chip is-active" type="button" data-filter="all">All</button>
              <button class="filter-chip" type="button" data-filter="concept">Concept</button>
              <button class="filter-chip" type="button" data-filter="skill">Skill</button>
              <button class="filter-chip" type="button" data-filter="reference">Reference</button>
            </div>
          </div>

          <div class="knowledge-content-grid">
            <div class="post-list loading-state" data-node-list>
              正在加载知识节点...
            </div>

            <aside class="detail-panel" data-node-detail>
              正在加载节点详情...
            </aside>
          </div>
        </section>
      </div>

      <button class="knowledge-sidebar-backdrop" type="button" data-sidebar-backdrop aria-label="关闭目录"></button>
    </main>

    <footer class="page-shell footer">
      <span data-i18n-zh="Knowledge 页面由图谱 JSON 与 Markdown 节点文件驱动。" data-i18n-en="Knowledge page powered by graph JSON and Markdown node files.">Knowledge 页面由图谱 JSON 与 Markdown 节点文件驱动。</span>
      <span><a class="inline-link" href="graph/README.md" data-i18n-zh="图谱说明" data-i18n-en="Graph guide">图谱说明</a></span>
    </footer>
  </body>
</html>
