<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interactive graph workspace for exploring knowledge nodes, source provenance, and relation paths.">
    <title>Graph | Personal Knowledge Graph</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/vis-network@9.1.9/styles/vis-network.min.css">
    <link rel="stylesheet" href="styles/site.css">
    <script defer src="https://unpkg.com/vis-network@9.1.9/dist/vis-network.min.js"></script>
    <script defer src="scripts/site.js"></script>
    <script defer src="scripts/graph.js"></script>
  </head>
  <body data-page="graph">
    <header class="site-header">
      <div class="site-nav">
        <a class="brand" href="index.html">
          <span class="brand-title" data-i18n-zh="Knowledge Graph" data-i18n-en="Knowledge Graph">Knowledge Graph</span>
          <span class="brand-subtitle" data-i18n-zh="图谱工作台：高可视化 + 可追溯来源" data-i18n-en="Graph workspace: visual + source-traceable">图谱工作台：高可视化 + 可追溯来源</span>
        </a>
        <div class="nav-right">
          <nav class="nav-links" aria-label="Main navigation">
            <a href="index.html" data-nav="home" data-i18n-zh="HOME" data-i18n-en="HOME">HOME</a>
            <a href="library.html" data-nav="library" data-i18n-zh="Library" data-i18n-en="Library">Library</a>
            <a href="knowledge.html" data-nav="knowledge" data-i18n-zh="Knowledge" data-i18n-en="Knowledge">Knowledge</a>
            <a href="projects.html" data-nav="projects" data-i18n-zh="Project" data-i18n-en="Project">Project</a>
            <a href="graph.html" data-nav="graph" data-i18n-zh="Graph" data-i18n-en="Graph">Graph</a>
            <a href="contact.html" data-nav="contact" data-i18n-zh="CONTACT" data-i18n-en="CONTACT">CONTACT</a>
          </nav>
          <div class="nav-controls">
            <button class="icon-btn" type="button" data-theme-toggle>
              <i class="fas fa-moon" aria-hidden="true"></i>
              <span data-theme-label>Dark</span>
            </button>
            <button class="icon-btn" type="button" data-lang-toggle>
              <i class="fas fa-language" aria-hidden="true"></i>
              <span data-lang-label>EN</span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="page-shell graph-page-shell" data-graph-workspace>
      <section class="graph-layout">
        <aside class="graph-controls panel">
          <div class="graph-controls-header">
            <h2 data-i18n-zh="图谱控制" data-i18n-en="Graph controls">图谱控制</h2>
            <button class="filter-chip graph-settings-btn" type="button" data-graph-settings-toggle aria-expanded="false" title="setting" aria-label="setting">
              <i class="fas fa-cog" aria-hidden="true"></i>
            </button>
          </div>

          <div class="graph-control-block">
            <label data-i18n-zh="显示模式" data-i18n-en="Display mode">显示模式</label>
            <div class="graph-mode-switch" data-graph-mode-switch>
              <button class="filter-chip is-active" type="button" data-graph-mode="knowledge" data-i18n-zh="知识网络" data-i18n-en="Knowledge Network">知识网络</button>
            </div>
          </div>

          <div class="graph-control-block">
            <label for="graph-search" data-i18n-zh="搜索节点" data-i18n-en="Search nodes">搜索节点</label>
            <input id="graph-search" class="search-input" type="search" placeholder="输入标题 / 标签 / 关键词" data-i18n-ph-zh="输入标题 / 标签 / 关键词" data-i18n-ph-en="Type title / tags / keywords" data-graph-search>
          </div>

          <div class="graph-control-block">
            <label for="graph-local-depth" data-i18n-zh="本地子图深度" data-i18n-en="Local graph depth">本地子图深度</label>
            <div class="graph-range-row">
              <input id="graph-local-depth" type="range" min="0" max="3" step="1" value="0" data-graph-depth>
              <span class="note-inline" data-graph-depth-label>0</span>
            </div>
            <div class="filter-group graph-chip-group" data-depth-mode-switch>
              <button class="filter-chip is-active" type="button" data-depth-mode="undirected" data-i18n-zh="Undirected depth" data-i18n-en="Undirected depth">Undirected depth</button>
              <button class="filter-chip" type="button" data-depth-mode="directed" data-i18n-zh="Directed depth" data-i18n-en="Directed depth">Directed depth</button>
            </div>
          </div>

          <div class="graph-control-block">
            <label data-i18n-zh="聚焦模式" data-i18n-en="Focus mode">聚焦模式</label>
            <div class="filter-group graph-chip-group" data-focus-mode-switch>
              <button class="filter-chip is-active" type="button" data-focus-mode="neighbors">Neighbors</button>
              <button class="filter-chip" type="button" data-focus-mode="upstream">Upstream</button>
              <button class="filter-chip" type="button" data-focus-mode="downstream">Downstream</button>
              <button class="filter-chip" type="button" data-focus-mode="both">Both</button>
            </div>
          </div>

          <div class="graph-control-block">
            <label data-i18n-zh="节点类型（当前模式）" data-i18n-en="Node types (current mode)">节点类型（当前模式）</label>
            <div class="filter-group graph-chip-group" data-node-type-filters></div>
          </div>

          <div class="graph-control-block">
            <label data-i18n-zh="学科分类（当前模式）" data-i18n-en="Disciplines (current mode)">学科分类（当前模式）</label>
            <label class="graph-edge-option">
              <input type="checkbox" data-domain-highlight-only>
              <span data-i18n-zh="仅高亮（不筛掉其它节点）" data-i18n-en="Highlight only (keep full context)">仅高亮（不筛掉其它节点）</span>
            </label>
            <div class="filter-group graph-chip-group" data-domain-filters></div>
          </div>

          <div class="graph-control-block">
            <label data-i18n-zh="关系类型（当前模式）" data-i18n-en="Edge types (current mode)">关系类型（当前模式）</label>
            <div class="graph-edge-filter" data-edge-type-filters></div>
          </div>

          <div class="graph-control-block">
            <label data-i18n-zh="快速查询" data-i18n-en="Quick queries">快速查询</label>
            <div class="graph-query-actions">
              <button class="filter-chip" type="button" data-query="missing-defined">Missing defined_in</button>
              <button class="filter-chip" type="button" data-query="weak-support">Weak support</button>
              <button class="filter-chip" type="button" data-query="top-degree">Top degree</button>
              <button class="filter-chip" type="button" data-query="clear">Clear</button>
            </div>
            <ul class="mini-list graph-query-results" data-query-results></ul>
          </div>
        </aside>

        <section class="graph-canvas-wrap">
          <div class="graph-canvas panel" data-graph-canvas aria-label="Knowledge graph visualization"></div>
          <div class="graph-legend panel">
            <h3 data-i18n-zh="图例" data-i18n-en="Legend">图例</h3>
            <div class="graph-legend-grid" data-graph-legend></div>
          </div>
        </section>

        <aside class="graph-detail panel" data-graph-detail>
          <h2 data-i18n-zh="节点详情" data-i18n-en="Node details">节点详情</h2>
          <p class="muted" data-i18n-zh="图谱工作台仅展示知识网络，并支持查看 defined_in/cite_from/support 来源链接。" data-i18n-en="The graph workspace now focuses on knowledge network only, with defined_in/cite_from/support provenance links.">图谱工作台仅展示知识网络，并支持查看 defined_in/cite_from/support 来源链接。</p>
        </aside>
      </section>

      <div class="graph-settings-backdrop" data-graph-settings-backdrop hidden></div>
      <aside class="graph-settings-drawer panel" data-graph-settings-panel hidden aria-hidden="true">
        <div class="graph-settings-drawer-header">
          <h3 data-i18n-zh="参数设置" data-i18n-en="Settings">参数设置</h3>
          <button class="filter-chip graph-settings-close" type="button" data-graph-settings-close aria-label="Close settings">✕</button>
        </div>
        <div class="graph-control-block">
          <label data-i18n-zh="重要参数调试" data-i18n-en="Key parameter tuning">重要参数调试</label>
          <div class="graph-tuning-grid">
            <div class="graph-tuning-item">
              <span data-i18n-zh="节点尺寸倍率" data-i18n-en="Node size scale">节点尺寸倍率</span>
              <div class="graph-range-row">
                <input type="range" min="0.6" max="1.8" step="0.05" value="0.95" data-tuning-key="nodeSizeScale">
                <input class="graph-tuning-number" type="number" min="0.6" max="1.8" step="0.05" value="0.95" data-tuning-number="nodeSizeScale" aria-label="Node size scale number input">
              </div>
            </div>
            <div class="graph-tuning-item">
              <span data-i18n-zh="度数增益" data-i18n-en="Degree gain">度数增益</span>
              <div class="graph-range-row">
                <input type="range" min="1" max="6" step="0.2" value="2.6" data-tuning-key="degreeGain">
                <input class="graph-tuning-number" type="number" min="1" max="6" step="0.2" value="2.6" data-tuning-number="degreeGain" aria-label="Degree gain number input">
              </div>
            </div>
            <div class="graph-tuning-item">
              <span data-i18n-zh="边宽倍率" data-i18n-en="Edge width scale">边宽倍率</span>
              <div class="graph-range-row">
                <input type="range" min="0.6" max="2.4" step="0.05" value="1.1" data-tuning-key="edgeWidthScale">
                <input class="graph-tuning-number" type="number" min="0.6" max="2.4" step="0.05" value="1.1" data-tuning-number="edgeWidthScale" aria-label="Edge width scale number input">
              </div>
            </div>
            <div class="graph-tuning-item">
              <span data-i18n-zh="层级间距" data-i18n-en="Level separation">层级间距</span>
              <div class="graph-range-row">
                <input type="range" min="80" max="220" step="5" value="150" data-tuning-key="levelSeparation">
                <input class="graph-tuning-number" type="number" min="80" max="220" step="5" value="150" data-tuning-number="levelSeparation" aria-label="Level separation number input">
              </div>
            </div>
            <div class="graph-tuning-item">
              <span data-i18n-zh="节点间距" data-i18n-en="Node spacing">节点间距</span>
              <div class="graph-range-row">
                <input type="range" min="120" max="300" step="10" value="210" data-tuning-key="nodeSpacing">
                <input class="graph-tuning-number" type="number" min="120" max="300" step="10" value="210" data-tuning-number="nodeSpacing" aria-label="Node spacing number input">
              </div>
            </div>
            <div class="graph-tuning-item">
              <span data-i18n-zh="物理迭代" data-i18n-en="Physics iterations">物理迭代</span>
              <div class="graph-range-row">
                <input type="range" min="80" max="400" step="10" value="240" data-tuning-key="physicsIterations">
                <input class="graph-tuning-number" type="number" min="80" max="400" step="10" value="240" data-tuning-number="physicsIterations" aria-label="Physics iterations number input">
              </div>
            </div>
          </div>
          <div class="graph-tuning-actions">
            <button class="filter-chip" type="button" data-tuning-reset data-i18n-zh="恢复默认" data-i18n-en="Reset defaults">恢复默认</button>
          </div>
        </div>
      </aside>
    </main>

    <footer class="page-shell footer">
      <span data-i18n-zh="Graph 工作台聚焦知识关系图与来源追溯。" data-i18n-en="Graph workspace focuses on knowledge relations and provenance tracing.">Graph 工作台聚焦知识关系图与来源追溯。</span>
      <span><a class="inline-link" href="graph/knowledge-graph.json" data-i18n-zh="打开图谱原始数据" data-i18n-en="Open raw graph data">打开图谱原始数据</a></span>
    </footer>
  </body>
</html>
