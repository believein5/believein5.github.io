        <div class="nav-right">

              <button class="domain-toggle" type="button" data-library-domain-toggle aria-expanded="false">
                <span class="domain-toggle-label" data-i18n-zh="经济学" data-i18n-en="Economics">经济学</span>
                <i class="fas fa-chevron-down" aria-hidden="true"></i>
              </button>
              <ul class="domain-children">

              <button class="domain-toggle" type="button" data-library-domain-toggle aria-expanded="false">
                <span class="domain-toggle-label" data-i18n-zh="机器人工程" data-i18n-en="Robotics Engineering">机器人工程</span>

      <div class="knowledge-main-area library-main-area">
        <section class="hero-block">

          <h1 class="hero-title" data-i18n-zh="按学科筛选书籍，<span class='accent'>逐本进入层次结构。</span>" data-i18n-en="Filter by discipline, <span class='accent'>open each book structure.</span>">按学科筛选书籍，<span class="accent">逐本进入层次结构。</span></h1>
        </section>

        <div class="toolbar library-toolbar">
          <button class="icon-btn sidebar-open-btn" type="button" data-library-sidebar-open>
            <i class="fas fa-bars" aria-hidden="true"></i>
            <span data-i18n-zh="学科" data-i18n-en="Disciplines">学科</span>
          </button>
        </div>

        <section class="library-layout">
          <section class="panel library-center">
            <h3 data-i18n-zh="书籍数据库" data-i18n-en="Book database">书籍数据库</h3>
            <div class="library-table-wrap">
              <table class="library-table">
                <thead>
                  <tr>
                    <th data-i18n-zh="书籍名称" data-i18n-en="Book">书籍名称</th>
                    <th data-i18n-zh="作者" data-i18n-en="Author">作者</th>
                  </tr>
                </thead>
                <tbody data-library-book-rows>
                  <tr><td colspan="2" class="muted">Loading...</td></tr>
                </tbody>
              </table>
            </div>
          </section>

          <aside class="panel library-right">
            <h3 data-i18n-zh="搜索" data-i18n-en="Search">搜索</h3>
            <input class="search-input" type="search" data-library-search placeholder="搜索书名 / 作者" data-i18n-ph-zh="搜索书名 / 作者" data-i18n-ph-en="Search by book / author">
            <p class="muted" data-i18n-zh="支持按书名和作者模糊检索。" data-i18n-en="Fuzzy search by title and author.">支持按书名和作者模糊检索。</p>

        </section>

    <footer class="page-shell footer">

      <span><a class="inline-link" href="graph/knowledge-graph.json" data-i18n-zh="打开图谱原始数据" data-i18n-en="Open raw graph data">打开图谱原始数据</a></span>
